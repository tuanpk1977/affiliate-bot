name: IndexNow post-deploy

on:
  push:
    branches: [main]
    paths:
      - "site_output/**"
      - "video_output/upload_links.csv"
      - "video_output/render_status.csv"

permissions:
  contents: read

jobs:
  notify-indexnow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Allow Netlify deploy to start
        run: sleep 90
      - name: Wait for Netlify and notify IndexNow
        run: python scripts/post_deploy.py --wait-seconds 600 --max-urls 100
